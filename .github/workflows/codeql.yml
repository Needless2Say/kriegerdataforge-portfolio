# CodeQL static analysis for the KDF marketing site, via the centralized reusable
# workflow in kriegerdataforge-cicd.
#
# ⚠️ GATED: CodeQL runs only on public repos (free) or private repos with
# "GitHub Code Security" (Enterprise add-on; NOT included in GitHub Pro/Copilot).
# This repo is private, so the analyze job is gated behind the `ENABLE_CODEQL`
# repo/org Actions variable and stays skipped (green) until that entitlement
# exists. To turn CodeQL on: set the variable `ENABLE_CODEQL=true` (repo or org
# level) once the repo is public or Code Security is purchased — no edit needed.

name: CodeQL

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0" # weekly, Sunday 00:00 UTC

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    # Skipped (neutral, non-blocking) until code scanning is entitled — see header.
    if: ${{ vars.ENABLE_CODEQL == 'true' }}
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: Needless2Say/kriegerdataforge-cicd/.github/workflows/ci-codeql.yml@main
    with:
      language: javascript-typescript
